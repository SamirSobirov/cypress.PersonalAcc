name: Personal Profile Management

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch:
    inputs:
      user_chat_id:
        description: 'ID чата для личного ответа'
        required: false
        default: ''

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        id: cypress_step # Добавили ID для точного отслеживания статуса этого шага
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/monitoring/profile.cy.js 
          browser: chrome
        env:
          CYPRESS_LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          CYPRESS_LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      - name: Parse Diagnostic Data
        if: always()
        run: |
          API_STATUS="UNKNOWN"
          
          # Безопасное чтение файла
          if [ -f auth_api_status.txt ]; then
            FILE_CONTENT=$(cat auth_api_status.txt | tr -d '[:space:]')
            # Если файл не пустой, берем из него данные
            if [ -n "$FILE_CONTENT" ]; then
              API_STATUS="$FILE_CONTENT"
            fi
          fi

          # Считываем реальный результат выполнения шага Cypress
          CYPRESS_OUTCOME="${{ steps.cypress_step.outcome }}"

          # Логика формирования статуса
          if [[ "$CYPRESS_OUTCOME" == "success" ]]; then
            MSG_STATUS="🟢 Success (Profile Updated)"
          else
            if [[ "$API_STATUS" == "UNKNOWN" ]]; then
              MSG_STATUS="❌ UI Error / Crash before Auth"
            # Строгая проверка, что API_STATUS это именно число, прежде чем сравнивать с 400
            elif [[ "$API_STATUS" =~ ^[0-9]+$ ]] && [[ "$API_STATUS" -ge 400 ]]; then
              MSG_STATUS="🆘 Auth API Error (HTTP $API_STATUS)"
            else
              MSG_STATUS="⚠️ Failed at Profile Editing Flow"
            fi
          fi

          echo "MSG_STATUS=$MSG_STATUS" >> $GITHUB_ENV

          # Определяем тип запуска
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "RUN_TYPE=Hourly ⏰" >> $GITHUB_ENV
          else
            echo "RUN_TYPE=Manual 🔘" >> $GITHUB_ENV
          fi

      - name: Upload Cypress Screenshots & Videos
        uses: actions/upload-artifact@v4
        if: failure() || always()
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots/
            cypress/videos/
          if-no-files-found: ignore

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: >-
            ${{ (github.event.inputs.user_chat_id != '') && 
            github.event.inputs.user_chat_id || 
            secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }} 
          format: markdown
          message: |
            ${{ github.event_name == 'schedule' && '📢 **Hourly Monitoring**' || '👤 **Manual Testing**' }}
            
            👤 **Module:** Personal Profile Management
            📊 **Status:** ${{ env.MSG_STATUS }}
            ⏱️ **Time:** ${{ env.RUN_TYPE }}